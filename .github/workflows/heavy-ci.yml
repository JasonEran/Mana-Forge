name: Heavy CI (full tests and packaging)

on:
  push:
    branches:
      - main
  pull_request:
    types: [labeled]

jobs:
  heavy-node-tests:
    name: Heavy Node tests
    runs-on: ubuntu-latest
    # Run on main pushes OR when a PR is labeled 'run/full-ci'
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/heads/main')) || (github.event_name == 'pull_request' && github.event.action == 'labeled' && github.event.label.name == 'run/full-ci')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18.18.0'

      - name: Install node-bot deps
        working-directory: ./node-bot
        run: npm ci

      - name: Run full node tests
        working-directory: ./node-bot
        run: npm test

  # Installer packaging is paused while the historical desktop-client work is
  # migrated to windows-launcher (ADR 0001). Reintroduce packaging only for
  # that canonical target and with a clean-install smoke test.

