name: Quality gates

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pull-request-contract:
    name: Pull request contract
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Require issue, validation, security, and rollback evidence
        run: node scripts/check-pr-contract.js

  backend-full:
    name: Backend full suite
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22.12.0
          cache: npm
          cache-dependency-path: node-bot/package-lock.json

      - name: Install backend dependencies
        working-directory: node-bot
        run: npm ci --no-audit --progress=false

      - name: Run complete backend suite
        working-directory: node-bot
        run: npm run test:full

      - name: Audit backend runtime dependencies
        working-directory: node-bot
        run: npm audit --omit=dev --audit-level=high

  backend-core:
    name: Backend Core profile
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22.12.0
          cache: npm
          cache-dependency-path: node-bot/package-lock.json

      - name: Install Core dependencies only
        working-directory: node-bot
        run: npm ci --omit=optional --no-audit --progress=false

      - name: Validate release metadata
        run: node scripts/check-release-metadata.js

      - name: Run Core profile suite
        working-directory: node-bot
        run: npm run test:core

      - name: Prove optional packages are absent
        working-directory: node-bot
        run: node -e "for (const name of ['tesseract.js','axios','esprima']) { try { require.resolve(name); throw new Error(name + ' should be absent'); } catch (error) { if (!String(error.message).includes('Cannot find module')) throw error; } }"

  launcher:
    name: Launcher suite
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22.12.0
          cache: npm
          cache-dependency-path: windows-launcher/package-lock.json

      - name: Install launcher dependencies
        working-directory: windows-launcher
        run: npm ci --no-audit --progress=false

      - name: Run launcher suite
        working-directory: windows-launcher
        run: npm test

      - name: Audit complete launcher dependency tree
        working-directory: windows-launcher
        run: npm audit --audit-level=high

  windows-release:
    name: Windows lifecycle and package
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      MANA_EVIDENCE_DIR: ${{ github.workspace }}/quality-evidence
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22.12.0
          cache: npm
          cache-dependency-path: |
            node-bot/package-lock.json
            windows-launcher/package-lock.json

      - name: Create evidence directory
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path $env:MANA_EVIDENCE_DIR | Out-Null

      - name: Install backend dependencies
        working-directory: node-bot
        run: npm ci --omit=optional --no-audit --progress=false

      - name: Install launcher dependencies
        working-directory: windows-launcher
        run: npm ci --no-audit --progress=false

      - name: Stage bundled Node runtime
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path node-bin | Out-Null
          $node = (Get-Command node -ErrorAction Stop).Source
          Copy-Item -LiteralPath $node -Destination node-bin/node.exe -Force
          if (-not (Test-Path node-bin/node.exe)) { throw "Bundled Node staging failed." }

      - name: Run real Windows backend lifecycle smoke
        shell: pwsh
        env:
          MANA_EVIDENCE_FILE: ${{ env.MANA_EVIDENCE_DIR }}/lifecycle.json
        run: node scripts/windows-lifecycle-smoke.js

      - name: Verify real Electron renderer isolation
        working-directory: windows-launcher
        run: npm run test:electron-security

      - name: Verify procedural avatar pixels
        working-directory: windows-launcher
        env:
          MANA_VISUAL_EVIDENCE_DIR: ${{ env.MANA_EVIDENCE_DIR }}/avatar
        run: npm run test:avatar-visual

      - name: Build canonical NSIS installer
        working-directory: windows-launcher
        run: npm run dist

      - name: Verify packaged boundary and model exclusion
        working-directory: windows-launcher
        env:
          MANA_EVIDENCE_FILE: ${{ env.MANA_EVIDENCE_DIR }}/package.json
          MANA_REQUIRE_BUNDLED_NODE: "1"
        run: npm run verify:package

      - name: Verify canonical installer artifact
        working-directory: windows-launcher
        run: npm run verify:installer

      - name: Write installer SHA-256
        run: node scripts/write-installer-checksum.js

      - name: Run clean install, launch, Doctor, and uninstall smoke
        shell: pwsh
        env:
          MANA_INSTALLER_EVIDENCE_FILE: ${{ env.MANA_EVIDENCE_DIR }}/installer.json
        run: |
          $installer = Get-ChildItem windows-launcher/dist -File -Filter 'Mana-Setup-*.exe' | Select-Object -First 1
          if (-not $installer) { throw "Canonical Mana installer was not found." }
          & powershell -NoProfile -ExecutionPolicy Bypass -File scripts/windows-installer-smoke.ps1 -InstallerPath $installer.FullName
          if ($LASTEXITCODE -ne 0) { throw "Installer smoke failed with exit code $LASTEXITCODE." }

      - name: Enforce resource budgets
        shell: pwsh
        run: node scripts/check-quality-budgets.js --lifecycle "$env:MANA_EVIDENCE_DIR\lifecycle.json" --package "$env:MANA_EVIDENCE_DIR\package.json" --installer "$env:MANA_EVIDENCE_DIR\installer.json"

      - name: Upload canonical Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: mana-windows-installer
          path: |
            windows-launcher/dist/Mana-Setup-*.exe
            windows-launcher/dist/Mana-Setup-*.exe.sha256
          if-no-files-found: error
          retention-days: 14

      - name: Upload quality evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-quality-evidence
          path: quality-evidence
          if-no-files-found: error
          retention-days: 30
